<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>tip_calculator — built by Echo Civilization</title>
<style>
 body { font-family: system-ui, sans-serif; max-width: 640px; margin: 2rem auto; }
 button { margin: 2px; padding: 6px 10px; }
 #state { background:#f4f4f4; padding:1rem; border-radius:8px; white-space:pre-wrap; }
 .prompt { color:#666; }
</style>
</head>
<body>
<h1>tip calculator</h1>
<p class="prompt">Prompt given to the civilization: <em>"Build a tip calculator."</em></p>
<input id="payload" placeholder="payload (text / number / json)"/>
<div>
    <button onclick="ui("SET_BILL")">SET_BILL</button>
    <button onclick="ui("SET_RATE")">SET_RATE</button>
    <button onclick="ui("COMPUTE")">COMPUTE</button>
</div>
<h3>live state</h3>
<div id="state">{}</div>
<script>
function createApp() {
  const state = { items: [], count: 0, bill: 0, rate: 0, result: 0,
                  total: 0, input: '', filter: 'all' };
  function dispatch(action, payload) {
    switch (action) {
      case "SET_BILL": { state.bill = Number(payload); break; }
      case "SET_RATE": { state.rate = Number(payload); break; }
      case "COMPUTE": { state.result = state.bill + state.bill * state.rate; break; }
      default: break;
    }
  }
  return { dispatch: dispatch, getState: function(){ return state; } };
}
if (typeof module !== 'undefined') { module.exports = { createApp: createApp }; }

const app = createApp();
function parsePayload(raw) {
  if (raw === '') return null;
  try { return JSON.parse(raw); } catch (e) { return raw; }
}
function ui(action) {
  app.dispatch(action, parsePayload(document.getElementById('payload').value));
  document.getElementById('state').textContent =
    JSON.stringify(app.getState(), null, 2);
}
ui('__render__');
</script>
</body>
</html>
